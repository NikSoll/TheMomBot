{% extends "base.html" %}

{% block title %}Создание бота{% endblock %}

{% block content %}
<div class="section-title">
    <h1>➕ Создание нового бота</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Тип бота:</label>
            <select name="bot_type" class="form-control">
                <option value="make" {% if selected_type == 'make' %}selected{% endif %}>💅 Запись на услуги</option>
                <option value="shop" {% if selected_type == 'shop' %}selected{% endif %}>🛍️ Интернет-магазин</option>
                <option value="quiz" {% if selected_type == 'quiz' %}selected{% endif %}>🎯 Квиз-бот</option>
                <option value="survey" {% if selected_type == 'survey' %}selected{% endif %}>📋 Опросник</option>
                <option value="mailer" {% if selected_type == 'mailer' %}selected{% endif %}>📢 Рассыльщик</option>
            </select>
        </div>

        <div class="form-group">
    <label>Платформа:</label>
    <select name="platform" class="form-control" id="platformSelect">
        <option value="tg" {% if selected_platform == 'tg' %}selected{% endif %}>Telegram</option>
        <option value="vk" {% if selected_platform == 'vk' %}selected{% endif %}>ВКонтакте</option>
        <option value="max" {% if selected_platform == 'max' %}selected{% endif %} disabled>Max (скоро)</option>
    </select>
</div>

<div class="form-group" id="vkGroupField" style="display: none;">
    <label>ID группы ВК:</label>
    <input type="text" name="group_id" class="form-control" placeholder="123456789">
    <small class="text-muted">ID вашего сообщества ВК (из адресной строки)</small>
</div>

        <div class="form-group">
            <label>Название бота:</label>
            <input type="text" name="bot_name" class="form-control" required
                   placeholder="Например: Бот для салона красоты">
        </div>

        <div class="form-group">
            <label>Токен бота (от @BotFather):</label>
            <input type="text" name="bot_token" class="form-control" required
                   placeholder="123456789:ABCdefGHIjklMNOpqrsTUVwxyz">
        </div>

        <button type="submit" class="btn btn-success">✨ Создать бота</button>
    </form>
</div>

<div class="info-section">
    <h3>📌 Как получить токен?</h3>
    <div class="steps">
        <div class="step">
            <div class="step-number">1</div>
            <div class="step-text">Напишите <a href="https://t.me/BotFather" target="_blank">@BotFather</a> в Telegram</div>
        </div>
        <div class="step">
            <div class="step-number">2</div>
            <div class="step-text">Отправьте команду <code>/newbot</code></div>
        </div>
        <div class="step">
            <div class="step-number">3</div>
            <div class="step-text">Скопируйте полученный токен</div>
        </div>
    </div>
</div>
{% endblock %}
<script>
document.getElementById('platformSelect').addEventListener('change', function() {
    const vkField = document.getElementById('vkGroupField');
    vkField.style.display = this.value === 'vk' ? 'block' : 'none';
});
</script>
