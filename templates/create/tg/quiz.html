{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}">
{% endblock %}

{% block content %}
<div class="create-container">
    <h2>🎯 Создание квиз-бота</h2>

    <form method="POST" action="{{ url_for('main.create_bot') }}">
        <input type="hidden" name="platform" value="tg">
        <input type="hidden" name="bot_type" value="quiz">

        <!--основные настройки-->
        <div class="settings-section">
            <h3>🔧 Основные настройки</h3>

            <div class="form-group">
                <label>Токен бота *</label>
                <input type="text" name="bot_token" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Название квиза *</label>
                <input type="text" name="quiz_name" class="form-control" value="Тест: Какая ты звезда?">
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="quiz_desc" class="form-control">Пройди тест и узнай результат!</textarea>
            </div>
        </div>

        <!--вопросы-->
        <div class="settings-section">
            <h3>❓ Вопросы</h3>
            <div id="questions-container"></div>
            <button type="button" class="add-btn" id="add-question">➕ Добавить вопрос</button>
        </div>

        <!-- результаты-->
        <div class="settings-section">
            <h3>🏆 Результаты</h3>
            <div id="results-container"></div>
            <button type="button" class="add-btn" id="add-result">➕ Добавить результат</button>
        </div>

        <button type="submit" class="btn btn-success btn-lg">✨ Создать квиз</button>
    </form>
</div>

<!--шаблоны-->
<template id="question-template">
    <div class="array-item question-item">
        <button type="button" class="remove-item">❌</button>
        <div class="form-group">
            <label>Вопрос</label>
            <input type="text" name="question_text[]" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Варианты ответов (каждый с новой строки)</label>
            <textarea name="question_options[]" class="form-control" rows="3" placeholder="Вариант 1&#10;Вариант 2&#10;Вариант 3"></textarea>
        </div>
        <div class="form-group">
            <label>Баллы за варианты (через запятую)</label>
            <input type="text" name="question_points[]" class="form-control" placeholder="10,5,0">
        </div>
    </div>
</template>

<template id="result-template">
    <div class="array-item result-item">
        <button type="button" class="remove-item">❌</button>
        <div class="form-group">
            <label>Тип результата</label>
            <input type="text" name="result_type[]" class="form-control" placeholder="star" required>
        </div>
        <div class="form-group">
            <label>Текст результата</label>
            <textarea name="result_text[]" class="form-control" rows="2" required>🌟 Вы звезда!</textarea>
        </div>
    </div>
</template>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/create.js') }}"></script>
{% endblock %}
