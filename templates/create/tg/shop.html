{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}">
{% endblock %}

{% block content %}
<div class="create-container">
    <h2>🛍️ Создание интернет-магазина</h2>

    <form method="POST" action="{{ url_for('main.create_bot') }}">
        <input type="hidden" name="platform" value="tg">
        <input type="hidden" name="bot_type" value="shop">

        <!--основные настройки-->
        <div class="settings-section">
            <h3>🔧 Основные настройки</h3>

            <div class="form-group">
                <label>Токен бота *</label>
                <input type="text" name="bot_token" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Название магазина *</label>
                <input type="text" name="shop_name" class="form-control" value="Мой магазин">
            </div>

            <div class="form-group">
                <label>Admin ID *</label>
                <input type="text" name="admin_id" class="form-control" value="6496349641">
            </div>

            <div class="two-columns">
                <div class="form-group">
                    <label>Валюта</label>
                    <select name="currency" class="form-control">
                        <option value="₽">Рубль (₽)</option>
                        <option value="$">Доллар ($)</option>
                        <option value="€">Евро (€)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Доставка</label>
                    <select name="delivery_available" class="form-control">
                        <option value="true">Да</option>
                        <option value="false">Нет</option>
                    </select>
                </div>
            </div>
        </div>

        <!--категории-->
        <div class="settings-section">
            <h3>📁 Категории товаров</h3>
            <div id="categories-container"></div>
            <button type="button" class="add-btn" id="add-category">➕ Добавить категорию</button>
        </div>

        <!--товары-->
        <div class="settings-section">
            <h3>📦 Товары</h3>
            <div id="products-container"></div>
            <button type="button" class="add-btn" id="add-product">➕ Добавить товар</button>
        </div>

        <!--астройки заказа-->
        <div class="settings-section">
            <h3>📝 Настройки заказа</h3>

            <div class="form-group">
                <label>Спрашивать имя</label>
                <select name="ask_name" class="form-control">
                    <option value="true">Да</option>
                    <option value="false">Нет</option>
                </select>
            </div>

            <div class="form-group">
                <label>Спрашивать телефон</label>
                <select name="ask_phone" class="form-control">
                    <option value="true">Да</option>
                    <option value="false">Нет</option>
                </select>
            </div>

            <div class="form-group">
                <label>Спрашивать адрес</label>
                <select name="ask_address" class="form-control">
                    <option value="true">Да</option>
                    <option value="false">Нет</option>
                </select>
            </div>

            <div class="form-group">
                <label>Спрашивать комментарий</label>
                <select name="ask_comment" class="form-control">
                    <option value="true">Да</option>
                    <option value="false">Нет</option>
                </select>
            </div>
        </div>

        <!--ообщения -->
        <div class="settings-section">
            <h3>💬 Сообщения</h3>

            <div class="form-group">
                <label>Приветствие</label>
                <textarea name="welcome_msg" class="form-control">🛍 Добро пожаловать в магазин!</textarea>
            </div>

            <div class="form-group">
                <label>Корзина пуста</label>
                <textarea name="cart_empty_msg" class="form-control">🛒 Корзина пуста</textarea>
            </div>

            <div class="form-group">
                <label>Заказ оформлен</label>
                <textarea name="order_success_msg" class="form-control">✅ Заказ оформлен! Спасибо за покупку.</textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-lg">✨ Создать магазин</button>
    </form>
</div>

<!--аблоны -->
<template id="category-template">
    <div class="array-item category-item">
        <button type="button" class="remove-item">❌</button>
        <div class="form-group">
            <label>Название категории</label>
            <input type="text" name="category_name[]" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Эмодзи</label>
            <input type="text" name="category_emoji[]" class="form-control" value="📦" maxlength="2">
        </div>
    </div>
</template>

<template id="product-template">
    <div class="array-item product-item">
        <button type="button" class="remove-item">❌</button>
        <div class="form-group">
            <label>Название товара</label>
            <input type="text" name="product_name[]" class="form-control" required>
        </div>
        <div class="two-columns">
            <div class="form-group">
                <label>Цена</label>
                <input type="number" name="product_price[]" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Категория ID</label>
                <input type="number" name="product_category[]" class="form-control" value="1">
            </div>
        </div>
        <div class="form-group">
            <label>Описание</label>
            <textarea name="product_desc[]" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Фото URL (опционально)</label>
            <input type="url" name="product_photo[]" class="form-control">
        </div>
    </div>
</template>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/create.js') }}"></script>
{% endblock %}
