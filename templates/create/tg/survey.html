{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/create.css') }}">
{% endblock %}

{% block content %}
<div class="create-container">
    <h2>📋 Создание опросника</h2>

    <form method="POST" action="{{ url_for('main.create_bot') }}">
        <input type="hidden" name="platform" value="tg">
        <input type="hidden" name="bot_type" value="survey">

        <!-- основные настройки-->
        <div class="settings-section">
            <h3>🔧 Основные настройки</h3>

            <div class="form-group">
                <label>Токен бота *</label>
                <input type="text" name="bot_token" class="form-control" required>
            </div>

            <div class="form-group">
                <label>Название опроса *</label>
                <input type="text" name="survey_name" class="form-control" value="Обратная связь">
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="survey_desc" class="form-control">Помогите нам стать лучше!</textarea>
            </div>

            <div class="form-group">
                <label>Анонимные ответы</label>
                <select name="anonymous" class="form-control">
                    <option value="true">Да</option>
                    <option value="false">Нет</option>
                </select>
            </div>
        </div>

        <!-- вопросы-->
        <div class="settings-section">
            <h3>❓ Вопросы</h3>
            <div id="questions-container"></div>
            <button type="button" class="add-btn" id="add-question">➕ Добавить вопрос</button>
        </div>

        <button type="submit" class="btn btn-success btn-lg">✨ Создать опрос</button>
    </form>
</div>

<!--шаблоны-->
<template id="question-template">
    <div class="array-item question-item">
        <button type="button" class="remove-item">❌</button>

        <div class="form-group">
            <label>Текст вопроса</label>
            <input type="text" name="question_text[]" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Тип вопроса</label>
            <select name="question_type[]" class="form-control">
                <option value="text">Текстовый ответ</option>
                <option value="single">Один вариант</option>
                <option value="multiple">Несколько вариантов</option>
                <option value="scale">Оценка по шкале</option>
            </select>
        </div>

        <div class="form-group options-field" style="display: none;">
            <label>Варианты ответов (каждый с новой строки)</label>
            <textarea name="question_options[]" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group scale-fields" style="display: none;">
            <div class="two-columns">
                <div class="form-group">
                    <label>Мин. значение</label>
                    <input type="number" name="scale_min[]" class="form-control" value="1">
                </div>
                <div class="form-group">
                    <label>Макс. значение</label>
                    <input type="number" name="scale_max[]" class="form-control" value="5">
                </div>
            </div>
        </div>
    </div>
</template>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/create.js') }}"></script>
{% endblock %}
