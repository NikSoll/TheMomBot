{% extends "create/max/base.html" %}

{% block bot_type %}make{% endblock %}
{% block form_title %}💅 Max бот записи (полная версия){% endblock %}

{% block extra_fields %}
<!--эбаот-->
<div class="settings-section">
    <h3>🏢 Информация о салоне</h3>
    
    <div class="form-group">
        <label>Название салона</label>
        <input type="text" name="shop_name" class="form-control" value="Салон красоты">
    </div>
    
    <div class="form-group">
        <label>Адрес</label>
        <input type="text" name="address" class="form-control" value="г. Москва, ул. Тверская, д. 1">
    </div>
    
    <div class="form-group">
        <label>Телефон</label>
        <input type="text" name="phone" class="form-control" value="+7 (495) 123-45-67">
    </div>
    
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" value="salon@example.com">
    </div>
    
    <div class="form-group">
        <label>Сайт</label>
        <input type="url" name="website" class="form-control" value="https://example.com">
    </div>
    
    <div class="form-group">
        <label>Часы работы</label>
        <input type="text" name="working_hours" class="form-control" value="Пн-Пт: 10:00-20:00, Сб-Вс: 11:00-18:00">
    </div>
</div>

<!--мастера-->
<div class="settings-section">
    <h3>👩‍🎨 Мастера</h3>
    <div id="masters-container"></div>
    <button type="button" class="add-btn" id="add-master">➕ Добавить мастера</button>
</div>

<!--услуги-->
<div class="settings-section">
    <h3>💇 Услуги и цены</h3>
    <div id="services-container"></div>
    <button type="button" class="add-btn" id="add-service">➕ Добавить услугу</button>
</div>

<!--расп-->
<div class="settings-section">
    <h3>📅 Расписание</h3>
    
    <div class="form-group">
        <label>Дни для записи (вперед)</label>
        <input type="number" name="booking_days" class="form-control" value="7" min="1" max="30">
    </div>
    
    <div class="form-group">
        <label>Временные слоты</label>
        <textarea name="available_times" class="form-control" rows="5">10:00&#10;11:00&#10;12:00&#10;13:00&#10;14:00&#10;15:00&#10;16:00&#10;17:00&#10;18:00&#10;19:00</textarea>
    </div>
</div>

<!--шаблоны-->
<template id="master-template">
    <div class="array-item">
        <button type="button" class="remove-item">❌</button>
        <input type="text" name="master_name[]" placeholder="Имя мастера" required>
        <input type="text" name="master_emoji[]" placeholder="Эмодзи" value="👤" maxlength="2">
        <input type="text" name="master_desc[]" placeholder="Описание">
        <input type="text" name="master_specialty[]" placeholder="Специализация">
    </div>
</template>

<template id="service-template">
    <div class="array-item">
        <button type="button" class="remove-item">❌</button>
        <input type="text" name="service_name[]" placeholder="Название услуги" required>
        <input type="text" name="service_price[]" placeholder="Цена">
        <input type="number" name="service_duration[]" placeholder="Длительность (мин)" value="60">
        <input type="text" name="service_desc[]" placeholder="Описание">
    </div>
</template>
{% endblock %}
