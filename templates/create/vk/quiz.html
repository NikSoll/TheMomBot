{% extends "create/vk/base.html" %}

{% block bot_type %}quiz{% endblock %}
{% block form_title %}🎯 VK Квиз-бот (полная версия){% endblock %}

{% block extra_fields %}
<!--основные настройки-->
<div class="settings-section">
    <h3>🔧 Основные настройки</h3>

    <div class="form-group">
        <label>Название квиза</label>
        <input type="text" name="quiz_name" class="form-control" value="Тест: Какая ты звезда?">
    </div>

    <div class="form-group">
        <label>Описание квиза</label>
        <textarea name="quiz_desc" class="form-control" rows="3">Пройди тест и узнай, на какую звезду ты похож!</textarea>
    </div>

    <div class="form-group">
        <label>Показывать описание перед началом</label>
        <select name="show_description" class="form-control">
            <option value="true">Да</option>
            <option value="false">Нет</option>
        </select>
    </div>
</div>

<!--вопрос-->
<div class="settings-section">
    <h3>❓ Вопросы</h3>
    <div id="questions-container"></div>
    <button type="button" class="add-btn" id="add-question">➕ Добавить вопрос</button>
</div>

<!--результ-->
<div class="settings-section">
    <h3>🏆 Результаты</h3>
    <div id="results-container"></div>
    <button type="button" class="add-btn" id="add-result">➕ Добавить результат</button>
</div>

<!--настройка счет-->
<div class="settings-section">
    <h3>📊 Настройки подсчета</h3>

    <div class="form-group">
        <label>Тип подсчета</label>
        <select name="calculation_type" class="form-control">
            <option value="max">Максимум баллов</option>
            <option value="sum">Сумма баллов</option>
            <option value="average">Среднее арифметическое</option>
        </select>
    </div>

    <div class="form-group">
        <label>Показывать баллы в результате</label>
        <select name="show_points" class="form-control">
            <option value="true">Да</option>
            <option value="false">Нет</option>
        </select>
    </div>
</div>

<!--сообщ-->
<div class="settings-section">
    <h3>💬 Сообщения</h3>

    <div class="form-group">
        <label>Приветственное сообщение</label>
        <textarea name="welcome_message" class="form-control" rows="2">🎯 Привет! Хочешь узнать, кто ты?</textarea>
    </div>

    <div class="form-group">
        <label>Сообщение перед результатом</label>
        <textarea name="before_result_message" class="form-control" rows="2">✨ Твой результат:</textarea>
    </div>

    <div class="form-group">
        <label>Сообщение после квиза</label>
        <textarea name="after_quiz_message" class="form-control" rows="2">Спасибо за участие!</textarea>
    </div>
</div>

<!--шаблоны-->
<template id="question-template">
    <div class="array-item question-item">
        <button type="button" class="remove-item">❌</button>

        <div class="form-group">
            <label>Текст вопроса</label>
            <input type="text" name="question_text[]" class="form-control" required>
        </div>

        <div class="form-group">
            <label>Варианты ответов (каждый с новой строки)</label>
            <textarea name="question_options[]" class="form-control" rows="4" placeholder="Вариант 1&#10;Вариант 2&#10;Вариант 3"></textarea>
        </div>

        <div class="form-group">
            <label>Баллы за варианты (через запятую)</label>
            <input type="text" name="question_points[]" class="form-control" placeholder="10,5,0,0">
            <small>Количество баллов должно соответствовать количеству вариантов</small>
        </div>

        <div class="form-group">
            <label>Можно выбрать несколько вариантов</label>
            <select name="question_multiple[]" class="form-control">
                <option value="false">Нет</option>
                <option value="true">Да</option>
            </select>
        </div>
    </div>
</template>

<template id="result-template">
    <div class="array-item result-item">
        <button type="button" class="remove-item">❌</button>

        <div class="form-group">
            <label>Тип результата (ключ)</label>
            <input type="text" name="result_type[]" class="form-control" placeholder="star" required>
            <small>Например: star, moon, sun - должен совпадать с ключами в баллах</small>
        </div>

        <div class="form-group">
            <label>Текст результата</label>
            <textarea name="result_text[]" class="form-control" rows="3" required>🌟 Ты звезда! Ты всегда в центре внимания.</textarea>
        </div>

        <div class="form-group">
            <label>Изображение (опционально)</label>
            <input type="url" name="result_image[]" class="form-control" placeholder="https://example.com/image.jpg">
        </div>

        <div class="form-group">
            <label>Минимальные баллы для этого результата</label>
            <input type="number" name="result_min_score[]" class="form-control" value="0">
        </div>
    </div>
</template>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/vk.js') }}"></script>
{% endblock %}
