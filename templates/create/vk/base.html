{% extends "create/base_create.html" %}

{% block platform %}vk{% endblock %}

{% block platform_fields %}
<div class="form-group">
    <label>Токен сообщества ВК:</label>
    <input type="text" name="vk_token" class="form-control" required>
    <small>Управление → Работа с API → Ключи доступа</small>
</div>

<div class="form-group">
    <label>ID группы:</label>
    <input type="text" name="group_id" class="form-control" required>
    <small>Цифры из адресной строки: vk.com/club123456789</small>
</div>

<div class="form-group">
    <label>Admin ID (для уведомлений):</label>
    <input type="text" name="admin_id" class="form-control">
</div>
{% endblock %}
